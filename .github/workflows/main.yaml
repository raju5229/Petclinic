name: CI-CD Pipeline (External Repo - Petclinic)

on:
push:
branches:
- main
workflow_dispatch:

jobs:
build-test-deploy:
runs-on: ubuntu-latest

```
env:
  SONAR_HOST_URL: http://<SONAR_IP>:9000
  NEXUS_URL: http://<NEXUS_IP>:8081
  TOMCAT_URL: http://<TOMCAT_IP>:8080

steps:
  # 1. Checkout this pipeline repo (optional but recommended)
  - name: Checkout Pipeline Repo
    uses: actions/checkout@v4

  # 3. Set up Java
  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: 'temurin'

  # 4. Build + Test
  - name: Build with Maven
    run: |
      cd Petclinic
      mvn clean install

  # 5. SonarQube Scan
  - name: SonarQube Analysis
    run: |
      cd Petclinic
      mvn sonar:sonar \
      -Dsonar.projectKey=petclinic \
      -Dsonar.host.url=${SONAR_HOST_URL} \
      -Dsonar.login=${{ secrets.SONAR_TOKEN }}

  # 6. Upload Artifact to Nexus
  - name: Deploy to Nexus
    run: |
      cd Petclinic
      mvn deploy -DskipTests \
      -Dnexus.username=${{ secrets.NEXUS_USERNAME }} \
      -Dnexus.password=${{ secrets.NEXUS_PASSWORD }}

  # 7. Deploy to Tomcat
  - name: Deploy WAR to Tomcat
    run: |
      cd Petclinic
      curl -u ${{ secrets.TOMCAT_USER }}:${{ secrets.TOMCAT_PASSWORD }} \
      --upload-file target/*.war \
      "${TOMCAT_URL}/manager/text/deploy?path=/petclinic&update=true"
```

