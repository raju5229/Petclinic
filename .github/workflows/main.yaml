name: CI-CD Pipeline (External Repo - Petclinic)

on:
push:
branches:
- main
workflow_dispatch:

jobs:
build-test-deploy:
runs-on: ubuntu-latest

```
env:
  SONAR_HOST_URL: http://<SONAR_IP>:9000
  NEXUS_URL: http://<NEXUS_IP>:8081
  TOMCAT_URL: http://<TOMCAT_IP>:8080

steps:
  # 1. Checkout pipeline repo
  - name: Checkout Pipeline Repo
    uses: actions/checkout@v4
    
  # 3. Set up Java
  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: 'temurin'

  # 4. Configure Maven settings (for Nexus auth)
  - name: Configure Maven settings
    run: |
      mkdir -p ~/.m2
      cat > ~/.m2/settings.xml <<EOF
      <settings>
        <servers>
          <server>
            <id>nexus</id>
            <username>${{ secrets.NEXUS_USERNAME }}</username>
            <password>${{ secrets.NEXUS_PASSWORD }}</password>
          </server>
        </servers>
      </settings>
      EOF

  # 5. Inject Nexus repo into pom.xml
  - name: Add Nexus to pom.xml
    run: |
      cd Petclinic
      sed -i '/<\/project>/i \
      <distributionManagement>\n\
        <repository>\n\
          <id>nexus</id>\n\
          <url>'"$NEXUS_URL"'/repository/maven-releases/</url>\n\
        </repository>\n\
      </distributionManagement>' pom.xml

  # 6. Build + Test
  - name: Build with Maven
    working-directory: Petclinic
    run: mvn clean install

  # 7. SonarQube Scan
  - name: SonarQube Analysis
    working-directory: Petclinic
    run: |
      mvn sonar:sonar \
      -Dsonar.projectKey=petclinic \
      -Dsonar.host.url=${SONAR_HOST_URL} \
      -Dsonar.login=${{ secrets.SONAR_TOKEN }}

  # 8. Upload Artifact to Nexus
  - name: Deploy to Nexus
    working-directory: Petclinic
    run: mvn deploy -DskipTests

  # 9. Deploy to Tomcat
  - name: Deploy WAR to Tomcat
    working-directory: Petclinic
    run: |
      curl -u ${{ secrets.TOMCAT_USER }}:${{ secrets.TOMCAT_PASSWORD }} \
      --upload-file target/*.war \
      "${TOMCAT_URL}/manager/text/deploy?path=/petclinic&update=true"
```
